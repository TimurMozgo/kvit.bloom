<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kvit.Bloom — Магазин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Kvit.Bloom</div>
    </header>

    <div class="search-wrapper">
        <input type="text" id="product-search" placeholder="Пошук квітів..." oninput="handleSearch()">
        <span class="search-icon">🔍</span>
    </div>

    <div class="categories-container">
        <button class="category-btn active" onclick="filterProducts('Все', this)">Всі</button>
        <button class="category-btn" onclick="filterProducts('Квіти', this)">Квіти</button>
        <button class="category-btn" onclick="filterProducts('Букети', this)">Букети</button>
        <button class="category-btn" onclick="filterProducts('Декор', this)">Декор</button>
    </div>

    <h1 class="section-title" id="current-category-title">Всі товари</h1>

    <main>
        <div id="products-container" class="product-grid"></div>
    </main>

    <div class="cart-fab" id="cart-fab" onclick="openCart()" style="display: none;"> 
        <div class="cart-icon-wrapper">
            <span class="cart-emoji">🛒</span>
            <span id="fab-count" class="cart-badge">0</span>
        </div>
    </div>

    <div id="cart-modal" class="cart-overlay">
        <div class="cart-container">
            <button class="close-cart-btn" onclick="closeCart()">✕</button>
            
            <div class="cart-header">
                <h2>Кошик</h2>
            </div>
            
            <div id="cart-stage-1">
                <div id="cart-items-list" class="cart-items-list"></div>
                <div class="cart-total-bar">
                    <b>Разом: </b><span id="cart-total-value">0 ₴</span>
                </div>
                <button id="checkout-btn" class="checkout-btn" onclick="goToCheckout()">Далі (Оформити)</button>
            </div>

            <div id="cart-stage-2" style="display: none;">
                <div class="order-form">
                    <h3>Деталі доставки:</h3>
                    <input type="text" id="customer-name" placeholder="Ваше ім'я">
                    <input type="tel" id="customer-phone" placeholder="Номер телефону">
                </div>
                <div class="cart-footer-btns">
                    <button class="back-btn" onclick="backToCart()">Назад</button>
                    <button class="final-btn" onclick="finalCheckout()">Замовити</button>
                </div>
            </div>
        </div>
    </div>

    <div class="floric-fab" onclick="toggleContactMenu()">
        <div class="pulse-ring"></div>
        <span>ЧАТ</span>
    </div>

    <div id="contact-menu" class="contact-menu">
        <a href="https://t.me/твой_ник" target="_blank" class="contact-link">Чат з флористом</a>
        <a href="tel:+380730403338" class="contact-link">Зателефонувати</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
