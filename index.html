<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kvit.Bloom — Магазин</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Kvit.Bloom</div>
    </header>

    <main>
        <div id="products-container" class="products-grid"></div>
    </main>

    <div class="cart-fab" id="cart-fab" onclick="openCart()" style="display: none;"> 
        <span id="fab-count">0</span>
    </div>

   <div id="cart-modal" class="cart-overlay">
        <div class="cart-container" style="position: relative;">
            <button onclick="closeCart()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 28px; cursor: pointer; z-index: 100; color: #333;">✕</button>
            
            <div id="cart-header" class="cart-header">
                <h2 style="margin: 0;">Кошик 🌸</h2>
            </div>
            
            <div id="cart-stage-1">
                <div id="cart-items-list" class="cart-items-list">
                    </div>
                
                <div id="cart-total-container" class="cart-total-container" style="margin: 15px 0; font-size: 1.2em;">
                    <b>Разом: </b><span id="cart-total-value">0 ₴</span>
                </div>

                <button id="checkout-btn" class="checkout-btn" onclick="goToCheckout()">
                    Далі (Оформити)
                </button>
            </div>

            <div id="cart-stage-2" style="display: none;">
                <div class="order-form" style="padding: 10px 0;">
                    <h3 style="margin-bottom: 15px; font-size: 1.1em;">Деталі доставки:</h3>
                    
                    <input type="text" id="customer-name" placeholder="Ваше ім'я" 
                        style="width: 100%; margin-bottom: 12px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box;">
                    
                    <input type="tel" id="customer-phone" placeholder="Номер телефону" 
                        style="width: 100%; margin-bottom: 12px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box;">
                    
                    <textarea id="customer-address" placeholder="Адреса (або номер відділення / самовивіз)" 
                        style="width: 100%; height: 80px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; resize: none;"></textarea>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button class="checkout-btn" onclick="backToCart()" style="background: #f0f0f0; color: #333; flex: 1; border: none; cursor: pointer;">
                        Назад
                    </button>
                    <button class="checkout-btn" onclick="finalCheckout()" style="flex: 2; border: none; cursor: pointer;">
                        Замовити
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
